---
#service(LB)
apiVersion: v1
kind: Service
metadata:
  name: ktcloud-lb
spec:
  type: LoadBalancer
  ports: 
  - port: 80
    targetPort: 80
  selector: 
   color: green
---
#deployment(blue)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ktcloud-blue
spec:
  replicas: 5
  selector:
    matchLabels:
      color: blue
  template:
    metadata:
      labels:
        color: blue
    spec:
      containers:
      - name: ktcloudctn-blue
        image: brian24/ktcloudinfra:blue
        resources:
          limits:
            cpu: "500m"
            memory: "64Mi"
        ports:
        - containerPort: 80
---
#deployment(green)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ktcloud-green
spec:
  replicas: 3
  selector: 
    matchLabels:
      color: green
  template:
    metadata:
      labels:
        color: green
    spec:
      containers:
      - name: ktcloudctn-green
        image: brian24/ktcloudinfra:green
        resources: 
          limits:
            cpu: "500m"
            memory: "64Mi"
        ports:
        - containerPort: 80

